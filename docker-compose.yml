services:

  backend:
    build:
      context: ./backend
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_WEBHOOK_AUTHORITIES: ${VITE_WEBHOOK_AUTHORITIES:-}
        VITE_WEBHOOK_HOSPITALITY: ${VITE_WEBHOOK_HOSPITALITY:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
